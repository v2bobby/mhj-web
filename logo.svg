<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 72" width="280" height="72" aria-label="Mayhaj Farm logo">
  <defs>
    <!-- Gradient for premium feel -->
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E0E7FF"/>
    </linearGradient>
  </defs>
  
  <!-- Icon: Stylized closed-loop with leaf and tech precision -->
  <g transform="translate(12, 8)">
    <!-- Outer precision ring (tech/futuristic) -->
    <circle cx="26" cy="28" r="24" fill="none" stroke="#10B981" stroke-width="2.5" stroke-opacity="0.9"/>
    <!-- Inner subtle ring -->
    <circle cx="26" cy="28" r="18" fill="none" stroke="#10B981" stroke-width="1" stroke-opacity="0.4"/>
    
    <!-- Closed loop arrow arc -->
    <path d="M14 20 A18 18 0 1 1 38 20" fill="none" stroke="#10B981" stroke-width="3" stroke-linecap="round"/>
    <!-- Arrow head -->
    <polygon points="38,20 32,15 32,25" fill="#10B981"/>
    
    <!-- Central leaf (growth & nature) -->
    <path d="M26 15 Q20 22 26 35 Q32 22 26 15" fill="#10B981" fill-opacity="0.95"/>
    <!-- Leaf vein detail -->
    <path d="M26 17 L26 33" fill="none" stroke="#052E16" stroke-width="1.2" stroke-opacity="0.6"/>
    <path d="M23 21 Q26 24 29 21" fill="none" stroke="#052E16" stroke-width="0.8" stroke-opacity="0.5"/>
    <path d="M22 26 Q26 29 30 26" fill="none" stroke="#052E16" stroke-width="0.8" stroke-opacity="0.5"/>
  </g>
  
  <!-- Wordmark -->
  <g transform="translate(72, 0)">
    <!-- MAYHAJ -->
    <text x="0" y="38" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="38" font-weight="700" letter-spacing="-1.5" fill="url(#textGrad)">MAYHAJ</text>
    
    <!-- FARM - smaller, elegant tracking -->
    <text x="2" y="58" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="500" letter-spacing="4" fill="#94A3B8">FARM</text>
    
    <!-- Subtle accent line under MAYHAJ (premium detail) -->
    <rect x="0" y="42" width="118" height="1.5" fill="#10B981" fill-opacity="0.7"/>
  </g>
</svg>